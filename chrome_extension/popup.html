<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fraud Detection Assessor</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h2>Transactions Risk Assessor</h2>
        <p class="subtitle">Powered by XGBoost & FastAPI</p>

        <!-- Input Form -->
        <form id="fraud-form">
            <div class="form-group">
                <label for="transaction_amount">Transaction Amount ($)</label>
                <input type="number" id="transaction_amount" placeholder="e.g., 150.50" step="0.01" min="0" required>
            </div>

            <div class="form-group">
                <label for="card_type">Card Type</label>
                <select id="card_type" required>
                    <option value="" disabled selected>Select a card</option>
                    <option value="visa">Visa</option>
                    <option value="mastercard">Mastercard</option>
                    <option value="amex">Amex</option>
                    <option value="discover">Discover</option>
                </select>
            </div>

            <div class="form-group">
                <label for="user_location">User Location (2-letter Code)</label>
                <input type="text" id="user_location" placeholder="e.g., US, UK, IN" maxlength="2" required>
            </div>

            <div class="form-group">
                <label for="transaction_frequency">Transaction Frequency</label>
                <input type="number" id="transaction_frequency" placeholder="Times per day" min="1" required>
            </div>

            <div class="form-group">
                <label for="device_type">Device Type</label>
                <select id="device_type" required>
                    <option value="" disabled selected>Select an origin device</option>
                    <option value="desktop">Desktop</option>
                    <option value="mobile">Mobile</option>
                </select>
            </div>

            <button type="submit" id="submit-btn" class="btn">Check Fraud Risk</button>
        </form>

        <!-- Error Container -->
        <div id="error-message" class="error hidden"></div>

        <!-- Output Container -->
        <div id="output-section" class="output hidden">
            <h3>Assessment Result</h3>
            <div class="result-row">
                <span>Risk Level:</span>
                <span id="risk-level" class="badge">--</span>
            </div>
            <div class="result-row">
                <span>Fraud Probability:</span>
                <span id="fraud-prob" class="value">--</span>
            </div>
            <div class="result-row">
                <span>Final Decision:</span>
                <span id="fraud-decision" class="value">--</span>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="popup.js"></script>
</body>
</html>
